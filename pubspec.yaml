name: swiftbook_ai
description: "A new Flutter project."
publish_to: 'none'

version:  1.0.3+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.3
  image_cropper:
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  http: ^1.4.0
  photo_view: ^0.15.0
  intl: ^0.20.2
  dio: ^5.9.0
  fluttertoast: ^8.2.12
  edge_alerts: ^0.0.1
  device_info_plus: ^9.1.2
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5
  progress_dialog_null_safe: ^3.0.0
  url_launcher: ^6.3.2
  quickalert:
  google_generative_ai: ^0.4.7
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/grid/
